name: dbt Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-postgres

      - name: Set up dbt profile
        env:
          DBT_DATABASE_URL: ${{ secrets.DBT_DATABASE_URL }}
        run: |
          python -c "
          import os, urllib.parse
          url = urllib.parse.urlparse(os.environ['DBT_DATABASE_URL'])
          profile = '''steam_analytics:
            target: prod
            outputs:
              prod:
                type: postgres
                host: {host}
                user: {user}
                password: \"{password}\"
                port: {port}
                dbname: {dbname}
                schema: transform
                threads: 4
          '''.format(host=url.hostname, user=url.username, password=url.password, port=url.port or 5432, dbname=url.path.lstrip('/'))
          os.makedirs(os.path.expanduser('~/.dbt'), exist_ok=True)
          with open(os.path.expanduser('~/.dbt/profiles.yml'), 'w') as f:
              f.write(profile)
          print('dbt profile created')
          "

      - name: Run dbt tests
        working-directory: transform
        env:
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          DBT_PROFILES_DIR: .
        run: |
          dbt deps
          dbt test