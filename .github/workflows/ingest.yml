name: Steam Data Ingestion

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install dlt[postgres] requests python-dotenv psycopg2-binary

      - name: Run player counts pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: python ingestion/pipelines/player_counts.py

      - name: Run steamspy pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ingestion/pipelines/steamspy_pipeline.py